name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.148.2"
          extended: true

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install root dependencies
        run: npm install

      - name: Install Sanity Studio dependencies
        working-directory: studio
        run: |
          npm install
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ secrets.SANITY_DATASET }}

      - name: Build Hugo site
        run: npm run build
        env:
          HUGO_BASEURL: ${{ steps.pages.outputs.base_url }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_VERSION: ${{ secrets.SANITY_API_VERSION }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Build Sanity Studio into dist
        shell: bash
        working-directory: studio
        run: |
          echo "Starting Sanity Studio build..."
          npx sanity build --base-path /studio
          
          echo "Building completed. Checking dist/ structure:"
          ls -la dist/ || echo "dist/ not found!"
          
          echo "Creating ../dist/studio directory..."
          mkdir -p ../dist/studio
          
          if [ -f dist/index.html ]; then
            echo "Found studio dist/index.html, copying to ../dist/studio/"
            cp -R dist/* ../dist/studio/
            echo "Copy completed."
          else
            echo "ERROR: dist/index.html not found!"
            ls -la dist/
            exit 1
          fi
          
          echo "Verifying ../dist/studio/ contents:"
          ls -la ../dist/studio/ || echo "Failed to create ../dist/studio/"
          
          if [ -f ../dist/studio/index.html ]; then
            echo "✓ Studio output is ready at ../dist/studio/index.html"
          else
            echo "ERROR: Studio output missing at ../dist/studio/index.html"
            exit 1
          fi
          
          echo "Rewriting asset paths in HTML..."
          sed -i 's|href="/static/|href="/studio/static/|g; s|src="/static/|src="/studio/static/|g' ../dist/studio/index.html
          echo "Asset path rewrite completed."
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ secrets.SANITY_DATASET }}

      - name: Verify Studio is included in dist
        shell: bash
        run: |
          echo "=== Listing dist/ structure ==="
          find dist -type f | head -20
          echo "=== Checking dist/studio/static/ ==="
          ls -la dist/studio/static/ 2>&1 | head -15
          echo "=== File count in dist/studio/static/ ==="
          find dist/studio/static -type f | wc -l
          echo "=== Verifying key files ==="
          test -f dist/studio/index.html && echo "✓ dist/studio/index.html" || echo "✗ dist/studio/index.html MISSING"
          test -f dist/studio/static/sanity-*.js && echo "✓ dist/studio/static/sanity-*.js" || echo "✗ sanity JS files MISSING"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
