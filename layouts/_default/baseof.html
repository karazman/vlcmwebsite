<!DOCTYPE html>
<html lang="{{ or site.Language.Lang `en` }}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Params.brand }}{{ end }}</title>
    <meta name="description" content="{{ site.Params.description }}">
    <link rel="icon" type="image/svg+xml" href="{{ `/favicon.svg` | relURL }}">
    <link rel="apple-touch-icon" href="{{ `/favicon.svg` | relURL }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    {{ with resources.Get "css/main.css" }}
    {{ if hugo.IsServer }}
    <link rel="stylesheet" href="{{ .RelPermalink }}">
    {{ else }}
    {{ with . | minify | fingerprint }}
    <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}">
    {{ end }}
    {{ end }}
    {{ end }}
</head>

<body>
    {{ partial "header.html" . }}
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    {{ $js := resources.Get "js/main.js" }}
    {{ with $js }}
    <script src="{{ .RelPermalink }}" defer></script>{{ end }}
</body>

</html>
