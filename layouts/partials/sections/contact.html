<section class="cta">
    <div class="container cta-grid">
        <div class="cta-copy reveal">
            <p class="eyebrow">Get started</p>
            <h2>Get a quote on your claim</h2>
            <p class="lead">Tell us about your claim and our team will return a fair, confidential quote — typically
                within 48 hours.</p>
            <ul class="contact-list">
                <li><strong>Email</strong> <a href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a></li>
                <li><strong>Phone</strong> <a href="tel:{{ site.Params.phone }}">{{ site.Params.phone }}</a></li>
            </ul>
        </div>
        <form class="cta-form reveal" data-endpoint="https://formsubmit.co/ajax/{{ site.Params.email }}" method="post"
            action="https://formsubmit.co/{{ site.Params.email }}">
            <div class="field">
                <label for="name">Full name</label>
                <input id="name" name="name" type="text" placeholder="Jane Doe" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="jane@company.com" required>
            </div>
            <div class="field">
                <label for="interest">Enquiry type</label>
                <select id="interest" name="interest">
                    <option>Creditor claim — FTX</option>
                    <option>Creditor claim — Haru Invest</option>
                    <option>Creditor claim — CoinLoan</option>
                    <option>Creditor claim — Other</option>
                    <option>Business liquidity / funding</option>
                </select>
            </div>
            <div class="field">
                <label for="message">Claim details</label>
                <textarea id="message" name="message" rows="3"
                    placeholder="Platform, approximate claim amount, and any documentation"></textarea>
            </div>
            <button class="btn btn-primary btn-block" type="submit">Request a quote</button>
            <p class="form-note" aria-live="polite">We reply within 48 hours. Your details stay confidential.</p>
        </form>
    </div>
</section>
