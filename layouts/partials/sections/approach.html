{{ $d := index site.Data "site" }}
<section class="approach{{ if not .IsHome }} approach--light{{ end }}">
    <div class="container">
        <div class="section-head reveal">
            <p class="eyebrow">How it works</p>
            <h2>From frozen claim to capital in four steps</h2>
        </div>
        <div class="steps">
            {{ range $d.approach }}
            <div class="step reveal">
                <span class="step-num">{{ .step }}</span>
                <h3>{{ .title }}</h3>
                <p>{{ .body }}</p>
            </div>
            {{ end }}
        </div>
    </div>
</section>
