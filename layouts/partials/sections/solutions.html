{{ $d := index site.Data "site" }}
<section class="solutions">
    <div class="container">
        <div class="section-head reveal">
            <p class="eyebrow">What we offer</p>
            <h2>Liquidity, built around your claim</h2>
            <p class="section-sub">A complete, transparent service for creditors who need capital now — not years from
                now.</p>
        </div>
        <div class="card-grid">
            {{ range $d.solutions }}
            <article class="solution-card reveal">
                <div class="solution-icon" aria-hidden="true">{{ .icon }}</div>
                <h3>{{ .title }}</h3>
                <p>{{ .body }}</p>
            </article>
            {{ end }}
        </div>
    </div>
</section>
