<header class="site-header" id="top">
    <div class="container header-inner">
        <a class="brand" href="{{ `/` | relURL }}">
            <span class="brand-mark" aria-hidden="true">VL</span>
            <span class="brand-name">{{ site.Params.brandShort | default site.Params.brand }}</span>
        </a>
        <nav class="main-nav" aria-label="Primary">
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-list">
                {{ $current := .RelPermalink }}
                {{ range site.Menus.main }}
                {{ $url := .URL | relLangURL }}
                {{ $active := or (eq $current $url) (and (ne $url (`/` | relLangURL)) (hasPrefix $current $url)) }}
                <li><a href="{{ .URL }}" {{ if $active }} class="active" {{ end }}>{{ .Name }}</a></li>
                {{ end }}
            </ul>
        </nav>
    </div>
</header>
