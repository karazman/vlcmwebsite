[about]
  eyebrow = "Who we are"
  heading = "A liquidity partner — for creditors and for businesses"
  body = "VL Capital Management is a specialist liquidity provider. When platforms freeze withdrawals or enter insolvency, we buy creditor claims at a fair, transparent price — giving claimants immediate capital instead of a multi-year wait. We also provide working-capital and bridge liquidity to businesses, underwriting the risk so you can move fast."

